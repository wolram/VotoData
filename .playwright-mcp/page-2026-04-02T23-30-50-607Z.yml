  - generic [ref=e132]:
    - 'heading "About Us: Making Prediction of Anything Possible" [level=2] [ref=e133]'
    - paragraph [ref=e134]: MiroFish is a next-generation AI prediction engine powered by multi-agent technology. It extracts seed information from the real world such as breaking news, policy drafts and financial signals, then automatically constructs a high-fidelity parallel digital world. Within this space, thousands of intelligent agents with independent personalities, long-term memory and behavioral logic freely interact and socially evolve. You can dynamically inject variables through a god's-eye view to precisely project future trajectories. The future is rehearsed in a digital sandbox so that decisions emerge victorious after hundreds of simulations.
    - heading "How It Works" [level=3] [ref=e135]
    - list [ref=e136]:
      - listitem [ref=e137]:
        - generic [ref=e138]: —
        - text: You provide seed materials such as data analysis reports or interesting stories and describe your prediction needs in natural language.
      - listitem [ref=e139]:
        - generic [ref=e140]: —
        - text: MiroFish returns a detailed prediction report and a deeply interactive high-fidelity digital world.
    - heading "Our Vision" [level=3] [ref=e141]
    - paragraph [ref=e142]: MiroFish is dedicated to building a swarm intelligence mirror that maps reality. By capturing emergent group behaviors sparked by individual interactions, it transcends the limits of traditional prediction.
    - list [ref=e143]:
      - listitem [ref=e144]:
        - generic [ref=e145]: —
